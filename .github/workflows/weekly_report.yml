name: BrowserStack Weekly Report

on:
  schedule:
    - cron: '0 9 * * 1' # Runs every Monday at 9:00 AM UTC
  workflow_dispatch:      # Allows you to run it manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Script to Generate Report
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python generate_report.py
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GIT_TOKEN }}
          commit-message: "chore: weekly browserstack test cases report"
          branch: "chore/browserstack-weekly-report"
          delete-branch: true
          title: "📊 Weekly BrowserStack Test Cases Report"
          body: |
            Automated weekly report of BrowserStack Test Cases (Added, Modified, Deleted).
            
            Please review the markdown report in `manual/reports/`.
            
            ⚠️ **IMPORTANT: State Tracking Limitation**
            This PR contains an update to `previous_state.json`. In order for next week's cron job to accurately diff the test cases, **this PR MUST be merged into `main` before the next schedule triggers**. If it is not merged, next week's run will incorrectly compare against the older state and generate duplicate test case reports.
          add-paths: |
            previous_state.json
            reports/*.md
